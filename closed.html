<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アセスメント終了 | IOB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark:  #2d5a3d;
      --green-mid:   #4a7c59;
      --beige:       #f7f4ef;
      --cream:       #fdfcf9;
      --text-dark:   #1a2e22;
      --text-mid:    #4a5e52;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 600px;
      text-align: center;
      background: #fff;
      border: 1px solid #e0d8c8;
      border-radius: 8px;
      padding: 3rem 2rem;
    }
    h1 {
      font-family: 'Noto Serif JP', serif;
      font-weight: 600;
      font-size: 1.6rem;
      color: var(--green-dark);
      margin-bottom: 1.5rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text-mid);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>アセスメント終了のお知らせ</h1>
    <p>このアセスメントは2026年5月末をもって終了いたしました。<br>ご利用ありがとうございました。</p>
  </main>
</body>
</html>
