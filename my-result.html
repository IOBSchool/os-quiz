<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイ診断結果 | IOB オーガニック知識アセスメント</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark:  #2d5a3d;
      --green-mid:   #4a7c59;
      --green-light: #7aaa8a;
      --green-pale:  #e8f2eb;
      --beige:       #f7f4ef;
      --cream:       #fdfcf9;
      --gold:        #c9a84c;
      --gold-light:  #e8d5a0;
      --text-dark:   #1a2e22;
      --text-mid:    #4a5e52;
      --text-light:  #8a9e92;
      --white:       #ffffff;
      --red:         #c0392b;
      --red-pale:    #fdf2f2;
      --orange:      #d68910;
      --orange-pale: #fef9e7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--beige);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ======= HEADER ======= */
    header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      padding: 20px 24px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(45,90,61,0.2);
    }
    header .label {
      color: var(--green-light);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    header h1 {
      color: var(--white);
      font-size: 18px;
      font-weight: 400;
      margin-top: 4px;
      font-family: 'Noto Serif JP', serif;
    }

    /* ======= MAIN ======= */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ======= LOADING / ERROR ======= */
    .state-box {
      background: var(--white);
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(45,90,61,0.08);
    }
    .state-box .icon { font-size: 48px; margin-bottom: 16px; }
    .state-box h2 { font-size: 20px; color: var(--text-dark); margin-bottom: 12px; }
    .state-box p  { font-size: 14px; color: var(--text-mid); line-height: 1.7; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--green-pale);
      border-top-color: var(--green-mid);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ======= PROFILE BANNER ======= */
    .profile-banner {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      border-radius: 20px;
      padding: 36px 40px;
      color: var(--white);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .profile-banner::before {
      content: '🌿';
      position: absolute;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 80px;
      opacity: 0.15;
    }
    .profile-banner .date-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--green-light);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .profile-banner h2 {
      font-size: 24px;
      font-weight: 400;
      font-family: 'Noto Serif JP', serif;
      margin-bottom: 4px;
    }
    .profile-banner .occupation {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    /* ======= SCORE CARD ======= */
    .score-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(45,90,61,0.08);
      margin-bottom: 20px;
    }
    .score-circle {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: conic-gradient(var(--green-mid) 0%, var(--green-pale) 0%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      position: relative;
      transition: background 1s ease;
    }
    .score-circle-inner {
      width: 108px; height: 108px;
      border-radius: 50%;
      background: var(--white);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .score-pct {
      font-size: 36px;
      font-weight: 700;
      color: var(--green-dark);
      line-height: 1;
      font-family: 'Cormorant Garamond', serif;
    }
    .score-pct span { font-size: 16px; }
    .score-correct { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .level-badge {
      display: inline-block;
      background: var(--green-pale);
      color: var(--green-dark);
      border: 1px solid var(--green-light);
      border-radius: 20px;
      padding: 6px 20px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    /* ======= DOMAIN SCORES ======= */
    .section-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(45,90,61,0.08);
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-mid);
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--green-pale);
      padding-bottom: 12px;
      margin-bottom: 24px;
    }

    .domain-score-item { margin-bottom: 20px; }
    .domain-score-item:last-child { margin-bottom: 0; }
    .domain-score-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .domain-score-name { font-size: 14px; font-weight: 500; }
    .domain-score-num  { font-size: 13px; color: var(--text-mid); }
    .domain-bar-bg {
      background: var(--green-pale);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .domain-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }
    .domain-score-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 10px;
    }
    .badge-good { background: var(--green-pale); color: var(--green-dark); }
    .badge-mid  { background: var(--orange-pale); color: var(--orange); }
    .badge-low  { background: var(--red-pale); color: var(--red); }

    /* ======= ADVICE ======= */
    .advice-card {
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .advice-weak   { background: var(--orange-pale); border-left: 3px solid var(--orange); }
    .advice-strong { background: var(--green-pale);  border-left: 3px solid var(--green-mid); }

    /* ======= REVIEW ======= */
    .review-toggle-btn {
      width: 100%;
      background: transparent;
      border: 2px solid var(--green-mid);
      color: var(--green-dark);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .review-toggle-btn:hover { background: var(--green-pale); }

    .review-list { display: none; }
    .review-list.show { display: block; }

    .review-item {
      border: 1px solid var(--green-pale);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .review-item-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 500;
    }
    .review-correct { background: var(--green-pale); color: var(--green-dark); }
    .review-wrong   { background: var(--red-pale);   color: var(--red); }
    .review-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .badge-correct { background: var(--green-mid); color: var(--white); }
    .badge-wrong   { background: var(--red); color: var(--white); }
    .review-body { padding: 16px 20px; background: var(--white); }
    .review-q { font-size: 13px; color: var(--text-mid); margin-bottom: 10px; }
    .review-choices { margin-bottom: 12px; }
    .review-choice {
      display: flex;
      gap: 8px;
      font-size: 13px;
      padding: 6px 0;
      color: var(--text-mid);
      line-height: 1.5;
    }
    .choice-marker {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .marker-correct { background: var(--green-mid); color: white; }
    .marker-user    { background: var(--red); color: white; }
    .marker-normal  { background: var(--green-pale); color: var(--text-mid); }
    .review-exp {
      background: var(--beige);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.7;
    }
    .review-exp strong { color: var(--green-dark); }

    /* ======= FOOTER CTA ======= */
    .cta-card {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      color: var(--white);
      margin-top: 24px;
    }
    .cta-card h3 { font-size: 18px; font-weight: 400; font-family: 'Noto Serif JP', serif; margin-bottom: 8px; }
    .cta-card p  { font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 24px; line-height: 1.7; }
    .btn-cta {
      display: inline-block;
      background: var(--gold);
      color: var(--white);
      text-decoration: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      transition: opacity 0.2s;
    }
    .btn-cta:hover { opacity: 0.85; }

    .retry-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-light);
      text-decoration: none;
    }
    .retry-link:hover { color: var(--green-mid); }

    @media (max-width: 480px) {
      .profile-banner { padding: 28px 24px; }
      .score-card     { padding: 28px 20px; }
      .section-card   { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="label">IOB · Organic Business School</div>
  <h1>マイ診断結果</h1>
</header>

<div class="container">
  <!-- ローディング -->
  <div id="loading" class="state-box">
    <div class="spinner"></div>
    <p>結果を読み込んでいます...</p>
  </div>

  <!-- エラー -->
  <div id="error" class="state-box" style="display:none;">
    <div class="icon">🔍</div>
    <h2>結果が見つかりませんでした</h2>
    <p>URLが正しくないか、データが存在しない可能性があります。<br>メールに記載されたリンクをご確認ください。</p>
    <a href="assessment.html" class="retry-link" style="margin-top:24px; display:inline-block; color:var(--green-mid);">▶ 診断を受ける</a>
  </div>

  <!-- 結果本体 -->
  <div id="result-body" style="display:none;">

    <!-- プロフィールバナー -->
    <div class="profile-banner">
      <div class="date-label">受診日</div>
      <h2 id="res-name"></h2>
      <div class="occupation" id="res-meta"></div>
    </div>

    <!-- スコアカード -->
    <div class="score-card">
      <div class="score-circle" id="score-circle">
        <div class="score-circle-inner">
          <div class="score-pct" id="res-pct">0<span>%</span></div>
          <div class="score-correct" id="res-correct"></div>
        </div>
      </div>
      <div class="level-badge" id="res-level"></div>
    </div>

    <!-- 分野別スコア -->
    <div class="section-card">
      <div class="section-title">分野別スコア</div>
      <div id="domain-list"></div>
    </div>

    <!-- アドバイス -->
    <div class="section-card" id="advice-section">
      <div class="section-title">あなたへのアドバイス</div>
      <div id="advice-list"></div>
    </div>

    <!-- 全問解説 -->
    <div class="section-card">
      <div class="section-title">全問 正解・解説</div>
      <button class="review-toggle-btn" onclick="toggleReview(this)">▼ 全問の正解・解説を見る</button>
      <div class="review-list" id="review-list"></div>
    </div>

    <!-- CTA -->
    <div class="cta-card">
      <h3>さらに深く学びたい方へ</h3>
      <p>IOBオーガニックビジネス講座では、<br>これらのテーマを体系的に学ぶことができます。</p>
      <a href="https://iob-school.com" target="_blank" class="btn-cta">IOB講座について見る →</a>
    </div>

    <a href="assessment.html" class="retry-link">もう一度診断を受ける</a>

  </div><!-- /result-body -->
</div>

// ======== メイン処理 ========
window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    showError();
    return;
  }

  try {
    const doc = await db.collection('responses').doc(id).get();
    if (!doc.exists) {
      showError();
      return;
    }
    const data = doc.data();
    renderResult(data);
  } catch (e) {
    console.error(e);
    showError();
  }
});

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
}

function renderResult(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result-body').style.display = 'block';

  const { name, email, occupation, score, domainScores, answers, timestamp } = data;
  const pct   = score.percentage;
  const dateStr = timestamp
    ? new Date(timestamp).toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' })
    : '記録なし';

  // プロフィール
  document.getElementById('res-name').textContent = name + ' さん';
  document.getElementById('res-meta').textContent = `受診日：${dateStr}　職業：${occupation || '未入力'}`;

  // スコア円グラフ
  const circle = document.getElementById('score-circle');
  circle.style.background =
    `conic-gradient(var(--green-mid) ${pct * 3.6}deg, var(--green-pale) 0deg)`;
  document.getElementById('res-pct').innerHTML   = `${pct}<span>%</span>`;
  document.getElementById('res-correct').textContent = `${score.correct}問正解 / 全${score.total}問中`;

  // レベル
  let level;
  if      (pct >= 80) level = '専門家レベル 🏆';
  else if (pct >= 60) level = '中級レベル ⭐';
  else if (pct >= 40) level = '初中級レベル 📚';
  else                level = '入門レベル 🌱';
  document.getElementById('res-level').textContent = level;

  // 分野別スコア
  let domainHtml = '';
  Object.entries(domainScores).forEach(([key, d]) => {
    const dp  = Math.round((d.correct / d.total) * 100);
    const dom = DOMAINS[key];
    let barColor, badgeClass, badgeText;
    if      (dp >= 75) { barColor = '#2d5a3d'; badgeClass = 'badge-good'; badgeText = '得意 ✓'; }
    else if (dp >= 50) { barColor = '#c9a84c'; badgeClass = 'badge-mid';  badgeText = 'まずまず'; }
    else               { barColor = '#c0392b'; badgeClass = 'badge-low';  badgeText = '要強化 ▲'; }
    domainHtml += `
      <div class="domain-score-item">
        <div class="domain-score-top">
          <span class="domain-score-name">${dom.icon} ${dom.label}</span>
          <span class="domain-score-num">${d.correct}/${d.total}問</span>
        </div>
        <div class="domain-bar-bg">
          <div class="domain-bar-fill" style="width:0%; background:${barColor};" data-width="${dp}%"></div>
        </div>
        <span class="domain-score-badge ${badgeClass}">${dp}% ${badgeText}</span>
      </div>`;
  });
  document.getElementById('domain-list').innerHTML = domainHtml;
  setTimeout(() => {
    document.querySelectorAll('.domain-bar-fill').forEach(el => {
      el.style.width = el.dataset.width;
    });
  }, 100);

  // アドバイス
  const weak   = Object.entries(domainScores).filter(([,d]) => Math.round(d.correct/d.total*100) < 50).map(([k]) => DOMAINS[k].label);
  const strong = Object.entries(domainScores).filter(([,d]) => Math.round(d.correct/d.total*100) >= 75).map(([k]) => DOMAINS[k].label);
  let adviceHtml = '';
  if (weak.length)   adviceHtml += `<div class="advice-card advice-weak">📌 <strong>重点強化分野：</strong>${weak.join('・')}<br>コースではこれらの分野を丁寧に学べます。受講後の変化を楽しみにしてください！</div>`;
  if (strong.length) adviceHtml += `<div class="advice-card advice-strong">🌟 <strong>すでに得意な分野：</strong>${strong.join('・')}<br>基礎がある分野です。コースではさらに深い知識と実践スキルが得られます！</div>`;
  if (!weak.length && !strong.length) adviceHtml = `<div class="advice-card advice-strong">バランスよく知識がついています！コースで全分野の知識をさらに深めましょう。</div>`;
  document.getElementById('advice-list').innerHTML = adviceHtml;

  // 全問解説
  const savedAnswers = answers || {};
  let reviewHtml = '';
  QUESTIONS.forEach(q => {
    const userAns = savedAnswers[q.id] ?? savedAnswers[String(q.id)];
    const isCorrect = userAns === q.correct;
    const headerClass = isCorrect ? 'review-correct' : 'review-wrong';
    const badge = isCorrect
      ? '<span class="review-badge badge-correct">正解 ✓</span>'
      : '<span class="review-badge badge-wrong">不正解 ✗</span>';

    let choicesHtml = '';
    q.choices.forEach((c, i) => {
      let markerClass = 'marker-normal', markerIcon = String.fromCharCode(65+i);
      if (i === q.correct && i === userAns) { markerClass = 'marker-correct'; markerIcon = '✓'; }
      else if (i === q.correct)              { markerClass = 'marker-correct'; }
      else if (i === userAns)                { markerClass = 'marker-user'; markerIcon = '✗'; }
      const textColor = (i === q.correct || i === userAns) ? 'color:var(--text-dark); font-weight:500;' : '';
      choicesHtml += `
        <div class="review-choice" style="${textColor}">
          <div class="choice-marker ${markerClass}">${markerIcon}</div>
          <span>${c}</span>
        </div>`;
    });

    reviewHtml += `
      <div class="review-item">
        <div class="review-item-header ${headerClass}">
          ${badge}
          <span>Q${q.id}. ${q.text}</span>
        </div>
        <div class="review-body">
          <div class="review-choices">${choicesHtml}</div>
          <div class="review-exp"><strong>解説：</strong>${q.explanation}</div>
        </div>
      </div>`;
  });
  document.getElementById('review-list').innerHTML = reviewHtml;
}

function toggleReview(btn) {
  const list = document.getElementById('review-list');
  if (list.classList.contains('show')) {
    list.classList.remove('show');
    btn.textContent = '▼ 全問の正解・解説を見る';
  } else {
    list.classList.add('show');
    btn.textContent = '▲ 閉じる';
  }
}
</script>
</body>
</html>
